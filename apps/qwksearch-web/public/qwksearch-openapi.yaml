openapi: 3.1.0
info:
  title: QwkSearch Research Agent API
  version: 1.0.0
  description: |
    A comprehensive API for QwkSearch - combining intelligent search capabilities with document management.

    ## Features
    - 🔍 Advanced web search with SearXNG integration
    - 🤖 AI-powered chat with contextual search
    - 📝 Document management with hierarchical structure
    - 👥 Team and organization collaboration
    - 🖼️ Image and video search
    - 📰 Article extraction and caching
    - ⭐ Favorites management
    - 💡 Smart suggestions and discovery
    - 🔄 Bulk operations and syncing
    - 🎨 Theme and settings management

servers:
  - url: https://qwksearch.com/api
    description: Production server

tags:
  - name: Search
    description: Web search operations with SearXNG
  - name: AI Chat
    description: AI-powered conversational search
  - name: Discovery
    description: Content discovery and suggestions
  - name: Articles
    description: Article extraction and caching
  - name: Media
    description: Image and video search
  - name: Favorites
    description: User favorites management
  - name: Documents
    description: Document management operations
  - name: Teams
    description: Team and collaboration management
  - name: Organizations
    description: Organization management
  - name: AI
    description: AI-powered features and text rewriting
  - name: Google Docs
    description: Google Docs integration and synchronization
  - name: Quotes
    description: Quote and citation management
  - name: Health
    description: System health and status

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if the API server is running and healthy
      operationId: getHealth
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                    example: "2025-12-01T12:00:00.000Z"

  # Search Endpoints
  /search:
    get:
      tags:
        - Search
      summary: Web search
      description: Search the web using SearXNG with various filters and options
      operationId: searchWeb
      parameters:
        - name: q
          in: query
          required: true
          description: Search query
          schema:
            type: string
            example: "artificial intelligence"
        - name: cat
          in: query
          description: Search category
          schema:
            type: string
            default: general
            enum: [general, news, images, videos, it, science]
        - name: page
          in: query
          description: Page number for pagination
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: lang
          in: query
          description: Language preference
          schema:
            type: string
            default: en-US
            example: en-US
        - name: safesearch
          in: query
          description: Enable safe search filtering
          schema:
            type: boolean
            default: false
        - name: recency
          in: query
          description: Filter by recency (e.g., day, week, month)
          schema:
            type: string
            enum: [day, week, month, year]
        - name: publicInstances
          in: query
          description: Use public SearXNG instances
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/SearchResult'
                  elapsedTime:
                    type: integer
                    description: Query execution time in milliseconds
                    example: 1250
        '400':
          description: Bad request - query parameter is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: No results found or server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /suggestions:
    post:
      tags:
        - Discovery
      summary: Generate search suggestions
      description: Generate intelligent search suggestions based on chat history using AI
      operationId: generateSuggestions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                chatHistory:
                  type: array
                  items:
                    type: object
                    properties:
                      role:
                        type: string
                        enum: [user, assistant]
                      content:
                        type: string
                chatModel:
                  $ref: '#/components/schemas/ModelWithProvider'
              required:
                - chatHistory
                - chatModel
      responses:
        '200':
          description: Suggestions generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items:
                      type: string
                    example: ["How does machine learning work?", "Best AI frameworks in 2025"]
        '500':
          description: Error generating suggestions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /discover:
    get:
      tags:
        - Discovery
      summary: Discover content by topic
      description: Get curated content from trusted sources on various topics
      operationId: discoverContent
      parameters:
        - name: topic
          in: query
          description: Topic to discover content for
          schema:
            type: string
            enum: [tech, finance, art, sports, entertainment]
            default: tech
        - name: mode
          in: query
          description: Discovery mode (normal returns all results, preview returns sample)
          schema:
            type: string
            enum: [normal, preview]
            default: normal
      responses:
        '200':
          description: Discovered content
          content:
            application/json:
              schema:
                type: object
                properties:
                  blogs:
                    type: array
                    items:
                      $ref: '#/components/schemas/SearchResult'
        '500':
          description: Error occurred during discovery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /article:
    get:
      tags:
        - Articles
      summary: Get article content
      description: Extract and cache article content from a URL
      operationId: getArticle
      parameters:
        - name: url
          in: query
          required: true
          description: URL of the article to fetch
          schema:
            type: string
            format: uri
            example: "https://example.com/article"
      responses:
        '200':
          description: Article retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  cached:
                    type: boolean
                    description: Whether the article was served from cache
                  article:
                    $ref: '#/components/schemas/Article'
        '400':
          description: URL parameter is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to fetch article
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Articles
      summary: Store article Q&A or update follow-up questions
      description: Store question-answer pairs or update follow-up questions for an article
      operationId: updateArticle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                  description: URL of the article
                question:
                  type: string
                  description: Question about the article
                answer:
                  type: string
                  description: Answer to the question
                followUpQuestions:
                  type: array
                  items:
                    type: string
                  description: List of follow-up questions
              required:
                - url
      responses:
        '200':
          description: Article data stored successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        '400':
          description: URL is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to store article data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chat:
    post:
      tags:
        - AI Chat
      summary: AI chat with search integration
      description: Send a message to AI chat with integrated web search capabilities
      operationId: chatWithAI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: object
                  properties:
                    messageId:
                      type: string
                    chatId:
                      type: string
                    content:
                      type: string
                  required:
                    - messageId
                    - chatId
                    - content
                optimizationMode:
                  type: string
                  enum: [speed, balanced, quality]
                  description: Search optimization mode
                focusMode:
                  type: string
                  description: Focus mode for specialized search (e.g., "webSearch", "academicSearch")
                history:
                  type: array
                  items:
                    type: array
                    items:
                      type: string
                    minItems: 2
                    maxItems: 2
                  description: Chat history as tuples of [role, content]
                files:
                  type: array
                  items:
                    type: string
                  description: File IDs to include in context
                chatModel:
                  $ref: '#/components/schemas/ModelWithProvider'
                systemInstructions:
                  type: string
                  description: Custom system instructions
              required:
                - message
                - optimizationMode
                - focusMode
                - chatModel
      responses:
        '200':
          description: Streaming response with AI chat
          headers:
            Content-Type:
              schema:
                type: string
                example: text/event-stream
            Connection:
              schema:
                type: string
                example: keep-alive
          content:
            text/event-stream:
              schema:
                type: string
                description: Server-sent events stream with AI responses
        '400':
          description: Invalid request body or missing message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error processing chat request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /chats:
    get:
      tags:
        - AI Chat
      summary: Get user's chat history
      description: Retrieve all chats for the authenticated user
      operationId: getUserChats
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Chats retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  chats:
                    type: array
                    items:
                      $ref: '#/components/schemas/Chat'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error retrieving chats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /favorites:
    get:
      tags:
        - Favorites
      summary: Get user favorites
      description: Retrieve all favorited articles for the authenticated user
      operationId: getFavorites
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Favorites retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  favorites:
                    type: array
                    items:
                      $ref: '#/components/schemas/Favorite'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error retrieving favorites
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Favorites
      summary: Add a favorite
      description: Add an article to user's favorites
      operationId: addFavorite
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                title:
                  type: string
                cite:
                  type: string
                author:
                  type: string
                author_cite:
                  type: string
                date:
                  type: string
                source:
                  type: string
                word_count:
                  type: integer
                html:
                  type: string
              required:
                - url
      responses:
        '200':
          description: Article already favorited
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  favorite:
                    $ref: '#/components/schemas/Favorite'
        '201':
          description: Favorite added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  favorite:
                    $ref: '#/components/schemas/Favorite'
        '400':
          description: URL is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error adding favorite
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Favorites
      summary: Remove a favorite
      description: Remove an article from user's favorites
      operationId: removeFavorite
      security:
        - bearerAuth: []
      parameters:
        - name: url
          in: query
          required: true
          description: URL of the article to remove
          schema:
            type: string
            format: uri
      responses:
        '200':
          description: Favorite removed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Favorite removed"
        '400':
          description: URL parameter is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Error removing favorite
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Document Management Endpoints
  /documents:
    get:
      tags:
        - Documents
      summary: Get all documents
      description: Retrieve a list of all documents in the system
      operationId: getAllDocuments
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Documents
      summary: Create a new document
      description: Create a new document with optional parent
      operationId: createDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
            examples:
              root-document:
                summary: Create root document
                value:
                  title: "My New Note"
                  content: "<p>This is my note content</p>"
              child-document:
                summary: Create child document
                value:
                  title: "Child Note"
                  content: "<p>This is a child note</p>"
                  parentId: "123"
      responses:
        '201':
          description: Document created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '400':
          description: Bad request (missing required fields)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/{id}:
    get:
      tags:
        - Documents
      summary: Get a document by ID
      description: Retrieve a single document by its unique identifier
      operationId: getDocumentById
      parameters:
        - name: id
          in: path
          required: true
          description: The document ID
          schema:
            type: string
            example: "1"
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - Documents
      summary: Update a document
      description: Update an existing document's properties
      operationId: updateDocument
      parameters:
        - name: id
          in: path
          required: true
          description: The document ID
          schema:
            type: string
            example: "1"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateDocumentRequest'
            examples:
              update-title:
                summary: Update title only
                value:
                  title: "Updated Title"
              update-content:
                summary: Update content
                value:
                  content: "<p>Updated content</p>"
              full-update:
                summary: Update multiple fields
                value:
                  title: "New Title"
                  content: "<p>New content</p>"
                  isExpanded: true
      responses:
        '200':
          description: Document updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Documents
      summary: Delete a document
      description: Delete a document and all its children
      operationId: deleteDocument
      parameters:
        - name: id
          in: path
          required: true
          description: The document ID
          schema:
            type: string
            example: "1"
      responses:
        '200':
          description: Document deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                        example: "1"
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/{id}/duplicate:
    post:
      tags:
        - Documents
      summary: Duplicate a document
      description: Create a copy of an existing document
      operationId: duplicateDocument
      parameters:
        - name: id
          in: path
          required: true
          description: The document ID to duplicate
          schema:
            type: string
            example: "1"
      responses:
        '201':
          description: Document duplicated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentResponse'
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/move:
    post:
      tags:
        - Documents
      summary: Move a document
      description: Move a document to a new position in the hierarchy
      operationId: moveDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveDocumentRequest'
            examples:
              move-as-child:
                summary: Move as child
                value:
                  draggedId: "2"
                  targetId: "1"
                  position: "child"
              move-before:
                summary: Move before sibling
                value:
                  draggedId: "3"
                  targetId: "2"
                  position: "before"
      responses:
        '200':
          description: Document moved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/MoveDocumentRequest'
        '400':
          description: Bad request (invalid operation)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/search/{query}:
    get:
      tags:
        - Documents
      summary: Search documents
      description: Search for documents by title or content
      operationId: searchDocuments
      parameters:
        - name: query
          in: path
          required: true
          description: The search query
          schema:
            type: string
            example: "meeting notes"
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /documents/bulk:
    post:
      tags:
        - Documents
      summary: Bulk update documents
      description: Update multiple documents at once (useful for syncing)
      operationId: bulkUpdateDocuments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                documents:
                  type: array
                  items:
                    $ref: '#/components/schemas/Document'
              required:
                - documents
            example:
              documents:
                - id: "1"
                  title: "Updated Document 1"
                  content: "<p>Content 1</p>"
                  parentId: null
                - id: "2"
                  title: "Updated Document 2"
                  content: "<p>Content 2</p>"
                  parentId: "1"
      responses:
        '200':
          description: Documents updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentListResponse'
        '400':
          description: Bad request (invalid data)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /teams:
    get:
      tags:
        - Teams
      summary: Get all teams
      description: Retrieve all teams the user has access to
      operationId: getAllTeams
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Team'

    post:
      tags:
        - Teams
      summary: Create a new team
      description: Create a new team within an organization
      operationId: createTeam
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Engineering Team"
                description:
                  type: string
                  example: "Team for engineering collaboration"
                organizationId:
                  type: string
                  example: "1"
              required:
                - name
                - organizationId
      responses:
        '201':
          description: Team created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Team'

  /teams/{id}/members:
    post:
      tags:
        - Teams
      summary: Add a team member
      description: Invite a new member to the team
      operationId: addTeamMember
      parameters:
        - name: id
          in: path
          required: true
          description: The team ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                role:
                  $ref: '#/components/schemas/UserRole'
              required:
                - email
                - role
      responses:
        '201':
          description: Member added successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/TeamMember'

  /organizations:
    get:
      tags:
        - Organizations
      summary: Get all organizations
      description: Retrieve all organizations the user belongs to
      operationId: getAllOrganizations
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Organization'

  /ai/rewrite:
    post:
      tags:
        - AI
      summary: Rewrite text using AI
      description: Use AI to rewrite and improve text for clarity, grammar, and style
      operationId: rewriteText
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                  description: The text to rewrite
                  example: "This is text that needs rewriting."
              required:
                - text
      responses:
        '200':
          description: Successful rewrite
          content:
            application/json:
              schema:
                type: object
                properties:
                  rewrittenText:
                    type: string
                    description: The AI-rewritten text
                    example: "This is text that has been rewritten."
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: AI service error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /google-docs/auth:
    get:
      tags:
        - Google Docs
      summary: Initiate Google OAuth flow
      description: Redirect to Google OAuth consent screen for authorization
      operationId: googleDocsAuth
      responses:
        '302':
          description: Redirect to Google OAuth

  /google-docs/callback:
    get:
      tags:
        - Google Docs
      summary: Google OAuth callback
      description: Handle OAuth callback from Google
      operationId: googleDocsCallback
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: OAuth authorization code
      responses:
        '200':
          description: Successful authentication
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string

  /google-docs/export:
    post:
      tags:
        - Google Docs
      summary: Export document to Google Docs
      description: Export a document to Google Docs
      operationId: exportToGoogleDocs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                documentId:
                  type: string
                  description: ID of the document to export
                accessToken:
                  type: string
                  description: Google OAuth access token
                refreshToken:
                  type: string
                  description: Google OAuth refresh token
              required:
                - documentId
                - accessToken
      responses:
        '200':
          description: Successfully exported
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      documentId:
                        type: string
                      webViewLink:
                        type: string
                      webContentLink:
                        type: string
        '404':
          description: Document not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /google-docs/import:
    post:
      tags:
        - Google Docs
      summary: Import document from Google Docs
      description: Import a Google Docs document
      operationId: importFromGoogleDocs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                googleDocId:
                  type: string
                  description: Google Docs document ID
                accessToken:
                  type: string
                  description: Google OAuth access token
                refreshToken:
                  type: string
                  description: Google OAuth refresh token
              required:
                - googleDocId
                - accessToken
      responses:
        '200':
          description: Successfully imported
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Document'

  /google-docs/share:
    post:
      tags:
        - Google Docs
      summary: Share Google Doc
      description: Share a Google Docs document with other users
      operationId: shareGoogleDoc
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                googleDocId:
                  type: string
                  description: Google Docs document ID
                email:
                  type: string
                  format: email
                  description: Email of user to share with
                role:
                  type: string
                  enum: [reader, commenter, writer]
                  description: Permission level
                accessToken:
                  type: string
                  description: Google OAuth access token
              required:
                - googleDocId
                - email
                - role
                - accessToken
      responses:
        '200':
          description: Successfully shared
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /quotes:
    get:
      tags:
        - Quotes
      summary: Get quotes for a document
      description: Retrieve all quotes associated with a document
      operationId: getQuotes
      parameters:
        - name: documentId
          in: query
          required: true
          schema:
            type: string
          description: Document ID to get quotes for
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Quote'
        '400':
          description: Missing documentId parameter
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Quotes
      summary: Create a new quote
      description: Add a new quote or citation to a document
      operationId: createQuote
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                documentId:
                  type: string
                  description: Document ID to add quote to
                text:
                  type: string
                  description: Quote text
                source:
                  type: string
                  description: Source of the quote
                author:
                  type: string
                  description: Author of the quote
                url:
                  type: string
                  description: URL reference
                pageNumber:
                  type: integer
                  description: Page number reference
                tags:
                  type: array
                  items:
                    type: string
                  description: Tags for categorization
              required:
                - documentId
                - text
      responses:
        '201':
          description: Quote created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Quote'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /quotes/{id}:
    put:
      tags:
        - Quotes
      summary: Update a quote
      description: Update an existing quote
      operationId: updateQuote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Quote ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text:
                  type: string
                source:
                  type: string
                author:
                  type: string
                url:
                  type: string
                pageNumber:
                  type: integer
                tags:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Quote updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

    delete:
      tags:
        - Quotes
      summary: Delete a quote
      description: Remove a quote from the system
      operationId: deleteQuote
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Quote ID
      responses:
        '200':
          description: Quote deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Search Schemas
    SearchResult:
      type: object
      properties:
        title:
          type: string
          description: Title of the search result
          example: "Understanding AI"
        url:
          type: string
          format: uri
          description: URL of the result
          example: "https://example.com/ai-article"
        content:
          type: string
          description: Snippet or description of the result
          example: "A comprehensive guide to artificial intelligence..."
        img_src:
          type: string
          format: uri
          description: Thumbnail image URL
        engine:
          type: string
          description: Search engine that provided this result
          example: "google"
        parsed_url:
          type: array
          items:
            type: string
          description: Parsed URL components

    ModelWithProvider:
      type: object
      properties:
        providerId:
          type: string
          description: ID of the AI model provider
          example: "openai"
        key:
          type: string
          description: Model key/identifier
          example: "gpt-4"
      required:
        - providerId
        - key

    Article:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: Article URL
        title:
          type: string
          description: Article title
        cite:
          type: string
          description: Citation information
        author:
          type: string
          description: Author name
        author_cite:
          type: string
          description: Author citation
        author_short:
          type: string
          description: Short author name
        author_type:
          type: string
          description: Type of author
        date:
          type: string
          description: Publication date
        source:
          type: string
          description: Source publication
        word_count:
          type: integer
          description: Word count
        html:
          type: string
          description: Article HTML content
        followUpQuestions:
          type: array
          items:
            type: string
          description: Generated follow-up questions
        qaHistory:
          type: array
          items:
            type: object
            properties:
              question:
                type: string
              answer:
                type: string
          description: Question-answer history

    ImageResult:
      type: object
      properties:
        url:
          type: string
          format: uri
        title:
          type: string
        img_src:
          type: string
          format: uri
        thumbnail:
          type: string
          format: uri

    VideoResult:
      type: object
      properties:
        url:
          type: string
          format: uri
        title:
          type: string
        img_src:
          type: string
          format: uri
        description:
          type: string
        iframe_src:
          type: string
          format: uri

    Chat:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        focusMode:
          type: string
        userId:
          type: string

    Favorite:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        url:
          type: string
          format: uri
        title:
          type: string
        cite:
          type: string
        author:
          type: string
        author_cite:
          type: string
        date:
          type: string
        source:
          type: string
        word_count:
          type: integer
        html:
          type: string
        createdAt:
          type: string
          format: date-time

          description: Wind speed unit

    # Document Schemas
    Document:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the document
          example: "1"
        title:
          type: string
          description: Document title
          example: "My Note"
        content:
          type: string
          description: HTML content of the document
          example: "<p>This is my note content</p>"
        parentId:
          type: string
          description: ID of the parent document (null for root documents)
          example: null
        children:
          type: array
          items:
            $ref: '#/components/schemas/Document'
          description: Child documents
        isExpanded:
          type: boolean
          description: Whether the document is expanded in the tree view
          example: true
        createdAt:
          type: string
          format: date-time
          description: Document creation timestamp
          example: "2025-12-01T12:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          description: Document last update timestamp
          example: "2025-12-01T12:00:00.000Z"
      required:
        - id
        - title
        - content
        - parentId

    CreateDocumentRequest:
      type: object
      properties:
        title:
          type: string
          description: Document title
          example: "New Note"
        content:
          type: string
          description: HTML content of the document
          example: "<p>Content</p>"
          default: ""
        parentId:
          type: string
          description: ID of the parent document
          example: null
      required:
        - title

    UpdateDocumentRequest:
      type: object
      properties:
        title:
          type: string
          description: Document title
          example: "Updated Title"
        content:
          type: string
          description: HTML content of the document
          example: "<p>Updated content</p>"
        parentId:
          type: string
          description: ID of the parent document
          example: "1"
        isExpanded:
          type: boolean
          description: Whether the document is expanded
          example: true

    MoveDocumentRequest:
      type: object
      properties:
        draggedId:
          type: string
          description: ID of the document being moved
          example: "2"
        targetId:
          type: string
          description: ID of the target document (null for root)
          example: "1"
        position:
          type: string
          enum: [before, after, child]
          description: Position relative to target
          example: "child"
      required:
        - draggedId
        - position

    UserRole:
      type: string
      enum: [owner, admin, member, viewer]
      description: User role within a team
      example: "member"

    TeamMember:
      type: object
      properties:
        id:
          type: string
          example: "1"
        name:
          type: string
          example: "John Doe"
        email:
          type: string
          format: email
          example: "john@example.com"
        role:
          $ref: '#/components/schemas/UserRole'
        avatarUrl:
          type: string
          format: uri
          example: "https://example.com/avatar.jpg"
        joinedAt:
          type: string
          format: date-time
          example: "2025-12-01T12:00:00.000Z"

    Team:
      type: object
      properties:
        id:
          type: string
          example: "1"
        name:
          type: string
          example: "Engineering Team"
        description:
          type: string
          example: "Team for engineering collaboration"
        members:
          type: array
          items:
            $ref: '#/components/schemas/TeamMember'
        createdAt:
          type: string
          format: date-time
          example: "2025-12-01T12:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-12-01T12:00:00.000Z"

    Organization:
      type: object
      properties:
        id:
          type: string
          example: "1"
        name:
          type: string
          example: "Acme Corp"
        slug:
          type: string
          example: "acme-corp"
        description:
          type: string
          example: "Acme Corporation workspace"
        logoUrl:
          type: string
          format: uri
          example: "https://example.com/logo.png"
        teams:
          type: array
          items:
            $ref: '#/components/schemas/Team'
        createdAt:
          type: string
          format: date-time
          example: "2025-12-01T12:00:00.000Z"
        updatedAt:
          type: string
          format: date-time
          example: "2025-12-01T12:00:00.000Z"

    DocumentResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/Document'

    DocumentListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: '#/components/schemas/Document'

    Quote:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the quote
          example: "quote-123"
        documentId:
          type: string
          description: ID of the document this quote belongs to
          example: "doc-456"
        text:
          type: string
          description: The quote text
          example: "To be or not to be"
        source:
          type: string
          description: Source of the quote
          example: "Hamlet"
        author:
          type: string
          description: Author of the quote
          example: "William Shakespeare"
        url:
          type: string
          description: URL reference for the quote
          example: "https://example.com/hamlet"
        pageNumber:
          type: integer
          description: Page number reference
          example: 42
        tags:
          type: array
          items:
            type: string
          description: Tags for categorizing the quote
          example: ["literature", "shakespeare"]
        createdAt:
          type: string
          format: date-time
          description: Creation timestamp
          example: "2025-12-01T12:00:00.000Z"
      required:
        - id
        - documentId
        - text

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          example: "An error occurred"
        message:
          type: string
          example: "An error occurred"
